    <script>
      (function () {
        const redirect = sessionStorage.redirect;

        delete sessionStorage.redirect;

        if (redirect && redirect !== window.location.href) {
          history.replaceState(
            null,
            null,
            redirect.replace(window.location.origin, ""),
          );
        }
      })();
    </script>
